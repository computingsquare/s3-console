services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  app:
    build:
      context: .
      target: app
    ports:
      - "8080:8080"
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      DEV_AUTH_HEADER_BYPASS: "true"
      AUTH_LOCAL_USERNAME: minioadmin
      AUTH_LOCAL_PASSWORD: minioadmin
      AUTH_JWT_SECRET: dev-jwt-secret-not-for-production
    depends_on:
      - minio

volumes:
  minio-data:
