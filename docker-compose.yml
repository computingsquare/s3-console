services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  backend:
    build:
      context: .
      target: backend
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      # Dev/e2e only: simulates an authenticated admin without a real oauth2-proxy in front.
      # Never set this in a Helm/production deployment.
      DEV_AUTH_HEADER_BYPASS: "true"
    depends_on:
      - minio

  app:
    build:
      context: .
      target: frontend
    ports:
      - "8080:8080"
    environment:
      BACKEND_HOST: backend:4000
    depends_on:
      - backend

volumes:
  minio-data:
