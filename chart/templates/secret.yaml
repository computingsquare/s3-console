{{- $secretName := printf "%s-credentials" .Release.Name }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app: {{ .Release.Name }}
type: Opaque
data:
  {{- if $existing.data }}
  {{- /* Preserve existing values on upgrades */}}
  accessKeyId: {{ index $existing.data "accessKeyId" | default (.Values.superAdmin.username | b64enc) }}
  secretAccessKey: {{ index $existing.data "secretAccessKey" | default (randAlphaNum 32 | b64enc) }}
  {{- if index $existing.data "jwtSecret" }}
  jwtSecret: {{ index $existing.data "jwtSecret" }}
  {{- else }}
  jwtSecret: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
  {{- else }}
  {{- /* First install: generate fresh credentials */}}
  accessKeyId: {{ .Values.superAdmin.username | b64enc | quote }}
  secretAccessKey: {{ randAlphaNum 32 | b64enc | quote }}
  jwtSecret: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
