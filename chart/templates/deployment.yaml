apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-conf-d
              mountPath: /etc/nginx/conf.d
            - name: tmp
              mountPath: /tmp
        - name: backend
          image: "{{ .Values.backendImage.repository }}:{{ .Values.backendImage.tag }}"
          imagePullPolicy: {{ .Values.backendImage.pullPolicy }}
          ports:
            - containerPort: 4000
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: backend-tmp
              mountPath: /tmp
          env:
            - name: S3_ENDPOINT
              value: {{ .Values.s3.endpoint | quote }}
            - name: S3_REGION
              value: {{ .Values.s3.region | quote }}
            - name: S3_FORCE_PATH_STYLE
              value: {{ .Values.s3.forcePathStyle | quote }}
            - name: AUTH_USER_HEADER
              value: {{ .Values.auth.userHeader | quote }}
            - name: AUTH_GROUPS_HEADER
              value: {{ .Values.auth.groupsHeader | quote }}
            - name: AUTH_ADMIN_GROUP
              value: {{ .Values.auth.adminGroup | quote }}
            {{- if .Values.s3.existingSecret }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret }}
                  key: accessKeyId
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret }}
                  key: secretAccessKey
            {{- else }}
            - name: S3_ACCESS_KEY_ID
              value: {{ .Values.s3.accessKeyId | quote }}
            - name: S3_SECRET_ACCESS_KEY
              value: {{ .Values.s3.secretAccessKey | quote }}
            {{- end }}
            {{- if .Values.auth.devHeaderBypass }}
            - name: DEV_AUTH_HEADER_BYPASS
              value: "true"
            {{- end }}
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-conf-d
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: backend-tmp
          emptyDir: {}
