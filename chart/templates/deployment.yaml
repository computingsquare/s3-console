{{- $appSecret := printf "%s-credentials" .Release.Name }}
{{- $s3Secret := .Values.s3.existingSecret | default $appSecret }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-conf-d
              mountPath: /etc/nginx/conf.d
            - name: tmp
              mountPath: /tmp
          env:
            - name: S3_ENDPOINT
              value: {{ .Values.s3.endpoint | quote }}
            - name: S3_REGION
              value: {{ .Values.s3.region | quote }}
            - name: S3_FORCE_PATH_STYLE
              value: {{ .Values.s3.forcePathStyle | quote }}
            - name: AUTH_USER_HEADER
              value: {{ .Values.auth.userHeader | quote }}
            - name: AUTH_GROUPS_HEADER
              value: {{ .Values.auth.groupsHeader | quote }}
            - name: AUTH_ADMIN_GROUP
              value: {{ .Values.auth.adminGroup | quote }}
            {{- /* S3 credentials: from existingSecret if set, else from values (injected via valuesFrom) */}}
            - name: S3_ACCESS_KEY_ID
              {{- if .Values.s3.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret }}
                  key: accessKeyId
              {{- else }}
              value: {{ .Values.s3.accessKeyId | quote }}
              {{- end }}
            - name: S3_SECRET_ACCESS_KEY
              {{- if .Values.s3.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret }}
                  key: secretAccessKey
              {{- else }}
              value: {{ .Values.s3.secretAccessKey | quote }}
              {{- end }}
            {{- /* App credentials: always from the auto-generated secret */}}
            - name: AUTH_LOCAL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $appSecret }}
                  key: accessKeyId
            - name: AUTH_LOCAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $appSecret }}
                  key: secretAccessKey
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $appSecret }}
                  key: jwtSecret
            {{- if .Values.auth.disableProxyHeaders }}
            - name: AUTH_DISABLE_PROXY_HEADERS
              value: "true"
            {{- end }}
            {{- if .Values.auth.sharedSecretHeader }}
            - name: AUTH_SHARED_SECRET_HEADER
              value: {{ .Values.auth.sharedSecretHeader | quote }}
            - name: AUTH_SHARED_SECRET_VALUE
              value: {{ .Values.auth.sharedSecretValue | quote }}
            {{- end }}
            {{- if .Values.auth.devHeaderBypass }}
            - name: DEV_AUTH_HEADER_BYPASS
              value: "true"
            {{- end }}
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-conf-d
          emptyDir: {}
        - name: tmp
          emptyDir: {}
