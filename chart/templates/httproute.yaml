{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  parentRefs:
    - name: {{ required "gateway.name is required when gateway.enabled=true" .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace | default .Release.Namespace }}
      {{- if .Values.gateway.sectionName }}
      sectionName: {{ .Values.gateway.sectionName }}
      {{- end }}
  {{- if .Values.gateway.host }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
{{- end }}
