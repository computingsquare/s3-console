image:
  repository: s3-console
  tag: latest
  pullPolicy: IfNotPresent

backendImage:
  repository: s3-console-backend
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  host: ""

# Gateway API HTTPRoute (alternative to ingress, for clusters with a Gateway controller).
# Enable auth.disableProxyHeaders=true when using this without an oauth2-proxy.
gateway:
  enabled: false
  name: ""          # name of the Gateway resource (required if enabled)
  namespace: ""     # namespace of the Gateway (defaults to same namespace)
  sectionName: ""   # optional listener name
  host: ""          # hostname for routing (optional, omit to match all hosts)

# S3/Minio connection used by the backend. Never exposed to the browser.
s3:
  endpoint: ""
  region: us-east-1
  forcePathStyle: true
  # If set, use this existing Secret (must have accessKeyId/secretAccessKey keys).
  # If empty, a Secret named "<release>-credentials" is auto-generated using superAdmin below.
  existingSecret: ""

# Superadmin credentials for the S3/MinIO backend.
# Ignored when s3.existingSecret is set.
# The auto-generated Secret persists across upgrades (lookup-based idempotency).
superAdmin:
  username: admin

# Identity headers injected by the reverse proxy (oauth2-proxy or equivalent) in front of this app.
auth:
  userHeader: X-Forwarded-Email
  groupsHeader: X-Forwarded-Groups
  adminGroup: s3-admin
  # Set to true when the app is exposed publicly without a trusted oauth2-proxy
  # in front (e.g. via gateway.enabled=true). Disables X-Forwarded-* header auth
  # entirely; only JWT cookie (username/password login) is accepted.
  # IMPORTANT: leave false only if a trusted proxy always injects the user headers.
  disableProxyHeaders: false
  # Defense-in-depth: require this header/value on every request in addition to
  # the user header. Set both to a shared secret configured in the upstream proxy.
  # Prevents header-forging if the Service is accidentally exposed without the proxy.
  sharedSecretHeader: ""  # e.g. X-Internal-Token
  sharedSecretValue: ""
  # Simulates an admin user, bypassing the header check entirely. Same flag as
  # local dev (DEV_AUTH_HEADER_BYPASS). Default false - only safe to enable
  # when the Service is unreachable except via an already-trusted path
  # (e.g. kubectl port-forward only, no Ingress/gatewayRoute at all). Never
  # enable this on a deployment reachable from outside the cluster.
  devHeaderBypass: false
