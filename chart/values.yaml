image:
  repository: s3-console
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  host: ""

# Maximum upload size enforced by nginx and the backend.
# nginx format: "500m", "10g", "0" (unlimited). Backend reads the same value.
maxUploadSize: "10g"

# Gateway API exposure with automatic TLS via cert-manager.
# Replaces the Ingress when enabled. Requires cert-manager and a Gateway controller
# (e.g. Cilium, Envoy Gateway, nginx Gateway Fabric) pre-installed in the cluster.
# Enable auth.disableProxyHeaders=true when exposing publicly without an oauth2-proxy.
gatewayRoute:
  enabled: false
  domains: []           # e.g. [s3-console.example.com]
  gateway:
    name: public-gateway
    namespace: platform-system
  issuer: letsencrypt-prod   # cert-manager ClusterIssuer name

# S3/Minio connection used by the backend. Never exposed to the browser.
s3:
  endpoint: ""
  region: us-east-1
  forcePathStyle: true
  # If set, use this existing Secret (must have accessKeyId/secretAccessKey keys).
  # If empty, a Secret named "<release>-credentials" is auto-generated using superAdmin below.
  existingSecret: ""

# Superadmin credentials for the S3/MinIO backend AND the web login page.
# Ignored for S3 when s3.existingSecret is set, but always used for app login.
# The auto-generated Secret persists across upgrades (lookup-based idempotency).
superAdmin:
  username: admin

# Identity headers injected by the reverse proxy (oauth2-proxy or equivalent) in front of this app.
auth:
  userHeader: X-Forwarded-Email
  groupsHeader: X-Forwarded-Groups
  adminGroup: s3-admin
  # Set to true when the app is exposed publicly without a trusted oauth2-proxy
  # in front (e.g. via gatewayRoute.enabled=true). Disables X-Forwarded-* header auth
  # entirely; only JWT cookie (username/password login) is accepted.
  # IMPORTANT: leave false only if a trusted proxy always injects the user headers.
  disableProxyHeaders: false
  # Defense-in-depth: require this header/value on every request in addition to
  # the user header. Set both to a shared secret configured in the upstream proxy.
  # Prevents header-forging if the Service is accidentally exposed without the proxy.
  sharedSecretHeader: ""  # e.g. X-Internal-Token
  sharedSecretValue: ""
  # Simulates an admin user, bypassing the header check entirely.
  # Never enable on a deployment reachable from outside the cluster.
  devHeaderBypass: false
